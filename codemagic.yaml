workflows:
  android-workflow:
    name: RtoEChallan Unsigned Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - keystore_credentials
      vars:
        PACKAGE_NAME: "com.rte.challan"
      java: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"
      - name: Build Unsigned Release APK
        script: |
          chmod +x ./gradlew
          # Isme hum koi password ya keystore use nahi kar rahe
          ./gradlew assembleRelease
    artifacts:
      - app/build/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - vikash6759ub@gmail.com
        notify:
          success: true
          failure: true
