workflows:
  android-workflow:
    name: RtoEChallan Final Signed Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - keystore_credentials
      vars:
        PACKAGE_NAME: "com.rte.challan"
      java: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"
      - name: Build and Sign Release APK
        script: |
          chmod +x ./gradlew
          # Direct file path aur updated password use kar rahe hain
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$CM_BUILD_DIR/app/rto_release.jks" \
            -Pandroid.injected.signing.store.password="Raj@123" \
            -Pandroid.injected.signing.key.alias="rtokey" \
            -Pandroid.injected.signing.key.password="Raj@123"
    artifacts:
      - app/build/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - vikash6759ub@gmail.com
        notify:
          success: true
          failure: true
