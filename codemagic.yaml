    scripts:
      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"
      - name: Decode Keystore
        script: |
          # Ye command kisi bhi space ya extra character ko remove karke sahi file banayegi
          echo "$CM_KEYSTORE" | tr -d '\n\r ' | base64 --decode > "$CM_BUILD_DIR/app/rto_release.jks"
          if [ -s "$CM_BUILD_DIR/app/rto_release.jks" ]; then
            echo "Success: Keystore file created successfully!"
          else
            echo "Error: Keystore file is empty!"
            exit 1
          fi
      - name: Build and Sign Release APK
        script: |
          chmod +x ./gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$CM_BUILD_DIR/app/rto_release.jks" \
            -Pandroid.injected.signing.store.password="$CM_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$CM_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$CM_KEY_PASSWORD"
